server.port=8080

# === PostgreSQL Database Configuration ===
spring.datasource.url=jdbc:postgresql://localhost:5432/aquatrade_db
spring.datasource.username=postgres
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# === JPA / Hibernate Properties ===
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# === JWT Configuration ===
jwt.secret=AquaTradeAI-SuperSecret-Key-2026-MUST-Be-At-Least-256-Bits-Long!!
jwt.expiration.default=3600000
jwt.expiration.remember=2592000000
