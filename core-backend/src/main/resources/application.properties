# Enable SSL - DISABLED FOR DEMO (using HTTP instead of HTTPS)
# server.ssl.enabled=true
# Path to the keystore (classpath will resolve to src/main/resources)
# server.ssl.key-store=classpath:keystore.p12
# Keystore password
# server.ssl.key-store-password=changeit
# Keystore type
# server.ssl.key-store-type=PKCS12
# Key alias
# server.ssl.key-alias=origin-server
# Server port - Changed from 8443 (HTTPS) to 8080 (HTTP) for demo
server.port=8080

# === PostgreSQL Database Configuration ===
spring.datasource.url=jdbc:postgresql://localhost:5432/aquatrade_db
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# === JPA / Hibernate Properties ===
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
